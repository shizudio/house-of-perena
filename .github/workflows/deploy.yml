name: Deploy to Vercel

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          output=$(npx vercel --yes --prod --token $VERCEL_TOKEN 2>&1)
          echo "$output"
          url=$(echo "$output" | grep -oE "https://[^ ]*vercel\.app" | tail -1)
          echo "$url" > .vercel-url
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Commit deployment URL
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .vercel-url
          git diff --cached --quiet || git commit -m "ci: record Vercel deployment URL [skip ci]"
          git push
